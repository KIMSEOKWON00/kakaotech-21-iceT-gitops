autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  size: 5Gi
  storageClass: ebs-sc

replicaCount: 1

image:
  tag: latest

ingress:
  host: koco-test.click
  certificateArn: ""
  # ⚠️ dev 환경(koco-test.click)의 ACM 인증서 ARN으로 교체 필요
  # aws acm list-certificates --region ap-northeast-2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
