apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: 'https://github.com/elastic/helm-charts.git'
    path: kibana
    targetRevision: main
    helm:
      values: |
        # ⚠️ 데모 환경 설정: allowAnonymous: true
        # 프로덕션 전환 시 OIDC 또는 IP 제한 추가 필요
        imageTag: 8.5.1
        elasticsearchHosts: "https://elasticsearch-master.elk.svc:9200"
        kibanaConfig:
          kibana.yml: |
            server.publicBaseUrl: "https://kibana.ktbkoco.com"
            server.host: "0.0.0.0"
            server.port: 5601
            
            elasticsearch.hosts: [ "https://elasticsearch-master.elk.svc:9200" ]
            elasticsearch.ssl.verificationMode: none
            elasticsearch.requestTimeout: 30000
            elasticsearch.pingTimeout: 1500

            xpack.security.enabled: false
            
            status.allowAnonymous: true
        
        ingress:
          enabled: true
          className: alb
          annotations:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
            alb.ingress.kubernetes.io/group.name: koco-alb-group
            alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
            # ⚠️ 사용 환경의 ACM 인증서 ARN으로 교체 필요
            # kibana.ktbkoco.com을 커버하는 인증서 사용
            # aws acm list-certificates --region ap-northeast-2
            alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:266735804784:certificate/5f2a8c3b-a576-4295-84c1-beb75ca562d9
            alb.ingress.kubernetes.io/backend-protocol: HTTP
            alb.ingress.kubernetes.io/healthcheck-path: /api/status
            alb.ingress.kubernetes.io/success-codes: '200'
          hosts:
            - host: kibana.ktbkoco.com
              paths:
                - path: /
                  pathType: Prefix

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: elk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
